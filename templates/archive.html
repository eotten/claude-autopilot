{% extends "base.html" %}
{% block content %}
<div class="space-y-6 fade-in">

    <div class="flex items-center justify-between">
        <h1 class="text-lg font-semibold text-gray-900">Archive</h1>
        <a href="{{ BASE_URL }}/" class="inline-flex items-center gap-1.5 text-sm text-gray-400 hover:text-accent transition">
            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
            </svg>
            Dashboard
        </a>
    </div>

    {% if tasks %}
    <div class="space-y-2">
        {% for task in tasks %}
        <div class="group rounded-xl border border-gray-100 bg-gray-50/50 p-4 hover:shadow-sm transition flex items-start justify-between gap-4"
             data-task-id="{{ task.id }}">
            <div class="flex-1 min-w-0">
                <div class="flex items-center gap-3">
                    <span class="h-2.5 w-2.5 rounded-full bg-gray-300 flex-shrink-0"></span>
                    <a href="{{ BASE_URL }}/task/{{ task.id }}" class="font-medium text-gray-500 hover:text-accent transition truncate">
                        {{ task.title }}
                    </a>
                </div>
                <div class="mt-1.5 flex items-center gap-3 pl-[22px]">
                    <span class="text-xs text-gray-400">{{ task.completed_at or task.created_at }}</span>
                    <span class="text-xs px-2 py-0.5 rounded-md bg-gray-100 text-gray-500">archived</span>
                </div>
            </div>
            <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition flex-shrink-0">
                <button onclick="unarchiveTask({{ task.id }})" title="Restore to completed"
                    class="rounded-lg p-2 text-gray-400 hover:text-accent hover:bg-accent/5 transition">
                    <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 15L3 9m0 0l6-6M3 9h12a6 6 0 010 12h-3" />
                    </svg>
                </button>
                <button onclick="deleteTask({{ task.id }})" title="Delete permanently"
                    class="rounded-lg p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 transition">
                    <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
                    </svg>
                </button>
            </div>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <div class="text-center py-16 text-gray-400">
        <svg class="h-12 w-12 mx-auto mb-3 text-gray-200" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M20.25 7.5l-.625 10.632a2.25 2.25 0 01-2.247 2.118H6.622a2.25 2.25 0 01-2.247-2.118L3.75 7.5M10 11.25h4M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125z" />
        </svg>
        <p class="text-sm">No archived tasks yet.</p>
    </div>
    {% endif %}

</div>

<script>
    const B = '{{ BASE_URL }}';

    async function unarchiveTask(id) {
        await fetch(`${B}/api/tasks/${id}/complete`, { method: 'POST' });
        document.querySelector(`[data-task-id="${id}"]`).remove();
    }

    async function deleteTask(id) {
        if (!confirm('Permanently delete this task and all its data?')) return;
        await fetch(`${B}/api/tasks/${id}`, { method: 'DELETE' });
        document.querySelector(`[data-task-id="${id}"]`).remove();
    }
</script>
{% endblock %}
