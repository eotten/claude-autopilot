<!DOCTYPE html>
<html lang="en" class="h-full bg-white">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Autopilot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        accent: '#6366f1',
                        'accent-light': '#818cf8',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .pulse-dot { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        /* Markdown prose styling */
        .prose { font-size: 0.875rem; line-height: 1.625; }
        .prose h1 { font-size: 1.25rem; font-weight: 700; margin-top: 1.5rem; margin-bottom: 0.5rem; }
        .prose h2 { font-size: 1.125rem; font-weight: 600; margin-top: 1.25rem; margin-bottom: 0.5rem; }
        .prose h3 { font-size: 1rem; font-weight: 600; margin-top: 1rem; margin-bottom: 0.25rem; }
        .prose p { margin-top: 0.5rem; margin-bottom: 0.5rem; }
        .prose ul, .prose ol { margin-top: 0.5rem; margin-bottom: 0.5rem; padding-left: 1.5rem; }
        .prose ul { list-style-type: disc; }
        .prose ol { list-style-type: decimal; }
        .prose li { margin-top: 0.125rem; margin-bottom: 0.125rem; }
        .prose code { font-family: ui-monospace, monospace; font-size: 0.8125rem; background: rgba(0,0,0,0.04); padding: 0.125rem 0.375rem; border-radius: 0.25rem; }
        .prose pre { margin-top: 0.75rem; margin-bottom: 0.75rem; background: rgba(0,0,0,0.04); padding: 0.75rem 1rem; border-radius: 0.5rem; overflow-x: auto; }
        .prose pre code { background: none; padding: 0; }
        .prose strong { font-weight: 600; }
        .prose a { color: #6366f1; text-decoration: underline; }
        .prose blockquote { border-left: 3px solid #e5e7eb; padding-left: 1rem; color: #6b7280; margin: 0.5rem 0; }
        .prose hr { border-top: 1px solid #e5e7eb; margin: 1rem 0; }
        .prose table { border-collapse: collapse; width: 100%; margin: 0.75rem 0; }
        .prose th, .prose td { border: 1px solid #e5e7eb; padding: 0.375rem 0.75rem; text-align: left; }
        .prose th { background: rgba(0,0,0,0.02); font-weight: 600; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="h-full">
    <div class="min-h-full">
        <!-- Nav -->
        <nav class="border-b border-gray-100">
            <div class="mx-auto max-w-5xl px-4 sm:px-6 lg:px-8">
                <div class="flex h-16 items-center justify-between">
                    <a href="{{ BASE_URL }}/" class="flex items-center gap-3">
                        <div class="h-8 w-8 rounded-lg bg-accent flex items-center justify-center">
                            <svg class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z" />
                            </svg>
                        </div>
                        <span class="text-lg font-semibold text-gray-900">Claude Autopilot</span>
                    </a>
                    <div class="flex items-center gap-4">
                        <a href="{{ BASE_URL }}/archive" class="text-sm text-gray-400 hover:text-accent transition">Archive</a>
                        <div id="queue-indicator" class="flex items-center gap-2 text-sm text-gray-400">
                            <span class="h-2 w-2 rounded-full bg-gray-200"></span>
                            Idle
                        </div>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Content -->
        <main class="mx-auto max-w-5xl px-4 sm:px-6 lg:px-8 py-8">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script>
        // Poll queue status
        async function updateQueueStatus() {
            try {
                const res = await fetch('{{ BASE_URL }}/api/queue/status');
                const data = await res.json();
                const el = document.getElementById('queue-indicator');
                if (data.running_count > 0) {
                    el.innerHTML = `<span class="h-2 w-2 rounded-full bg-green-400 pulse-dot"></span><span class="text-green-600">${data.running_count} task${data.running_count > 1 ? 's' : ''} running</span>`;
                } else if (data.paused_count > 0) {
                    el.innerHTML = `<span class="h-2 w-2 rounded-full bg-yellow-400"></span><span class="text-yellow-600">${data.paused_count} paused (rate limited)</span>`;
                } else {
                    el.innerHTML = `<span class="h-2 w-2 rounded-full bg-gray-200"></span><span class="text-gray-400">Idle</span>`;
                }
            } catch(e) {}
        }
        setInterval(updateQueueStatus, 5000);
        updateQueueStatus();
    </script>
</body>
</html>
